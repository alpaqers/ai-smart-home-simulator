syntax = "proto3";

package smarthome.v1;

message DeviceStateChange {
	int32 device_id = 1;
	int64 timestamp = 2;
	map<string, string> parameters = 3;
	int32 device_type = 4;
}

message DeviceStateUpdate {
	int32 device_id = 1;
	int64 timestamp = 2;
	int32 command_type = 3;
	map<string, string> parameters = 4;
}

message DeviceResponse {
	int32 device_id = 1;
	int64 timestamp = 2;
	bool success = 3;
	string message = 4;
}
