syntax = "proto3";

package smarthome.v1;

message DeviceStateChange {
	int32 device_id = 1;
	int64 timestamp = 2;
	map<string, string> parameters = 3;
	string device_type = 4;
}

message DeviceStateUpdate {
	int32 device_id = 1;
	int64 timestamp = 2;
	int32 command_type = 3;
	map<string, string> parameters = 4;
}

message DeviceResponse {
	int32 device_id = 1;
	int64 timestamp = 2;
	bool success = 3;
	string message = 4;
}

message DeviceRegisterReq{
    int32 device_id = 1;
    string device_type = 2;
    map<string, string> capabilities = 3;
    map<string, string> device_state = 4;
    int64 timestamp = 5;
}

message DeviceRegisterResp {
    int32 device_id = 1;
    bool success = 2;
    int64 timestamp = 3;
	optional string cause = 4;
}

message Envelope {
    oneof payload {
        DeviceStateChange device_state_change = 1;
        DeviceStateUpdate device_state_update = 2;
        DeviceResponse device_response = 3;
        DeviceRegisterReq device_register_req = 4;
        DeviceRegisterResp device_register_resp = 5;
    }
}

